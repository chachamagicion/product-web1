<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>로또 번호 추첨기</h1>
            <button id="theme-toggle">다크 모드</button>
        </header>
        <main>
            <section class="lotto-section">
                <h2>추첨된 번호</h2>
                <div id="lotto-numbers" class="lotto-numbers-container">
                    <!-- 생성된 번호가 여기에 표시됩니다. -->
                </div>
                <button id="generate-btn">번호 추첨</button>
            </section>
        </main>
        <footer>
            <div id="contact-form-section">
              <h2>제휴 문의</h2>
              <form id="contact-form" action="https://formspree.io/f/mykdrlqa" method="POST">
                <div class="form-group">
                  <label for="name">이름</label>
                  <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                  <label for="email">이메일</label>
                  <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                  <label for="message">문의 내용</label>
                  <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit">보내기</button>
              </form>
            </div>
        </footer>
    </div>
    <script src="main.js"></script>
</body>
</html>
