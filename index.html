<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>저녁 메뉴 추첨</title>
    <link rel="stylesheet" href="style.css">
    <meta name="google-adsense-account" content="ca-pub-4424585063052814">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4424585063052814"
     crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>오늘 저녁 뭐 먹지?</h1>
            <button id="theme-toggle">다크 모드</button>
        </header>
        <main>
            <section class="menu-section">
                <h2>버튼을 눌러 저녁 메뉴를 추천받으세요!</h2>
                <div class="menu-result-container">
                    <div class="menu-item" id="menu-result">?</div>
                </div>
                <button id="generate-btn">오늘의 메뉴 추첨</button>
            </section>
        </main>
        <footer>
            <div id="contact-form-section">
              <h2>제휴 문의</h2>
              <form id="contact-form" action="https://formspree.io/f/mykdrlqa" method="POST">
                <div class="form-group">
                  <label for="name">이름</label>
                  <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                  <label for="email">이메일</label>
                  <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                  <label for="message">문의 내용</label>
                  <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit">보내기</button>
              </form>
            </div>

            <div id="comments-section">
                <h2>댓글</h2>
                <div id="disqus_thread"></div>
            </div>
        </footer>
    </div>
    <script src="main.js"></script>
    <script>
        (function() { 
            var d = document, s = d.createElement('script');
            s.src = 'https://productbewhy.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
</body>
</html>
